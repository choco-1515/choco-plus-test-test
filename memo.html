<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>乙! 全画面版</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black; /* 背景黒 */
}

/* スクロールバー非表示 */
body::-webkit-scrollbar { display: none; }

/* 乙!専用レイヤー */
#screen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2147483647;
}

#otsu {
    font-weight: 900;
    font-family: sans-serif;
    font-size: 40vmin;
    animation: colorChange 0.5s infinite;
}

@keyframes colorChange {
    0% { color: red; }
    20% { color: orange; }
    40% { color: yellow; }
    60% { color: lime; }
    80% { color: cyan; }
    100% { color: magenta; }
}
</style>
</head>
<body>

<div id="screen">
    <div id="otsu">乙!</div>
</div>

<script>
// 他の body 要素を削除（念のため）
Array.from(document.body.children).forEach(el=>{
    if(el.id !== "screen") el.remove();
});

// フルスクリーン化
function goFullScreen() {
    const elem = document.documentElement;
    if(elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
    else if(elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if(elem.msRequestFullscreen) elem.msRequestFullscreen();
}

// 自動フルスクリーン
window.addEventListener("load", ()=>setTimeout(goFullScreen, 100));

// フルスクリーン解除時復帰
document.addEventListener("fullscreenchange", ()=>{ if(!document.fullscreenElement) goFullScreen(); });
document.addEventListener("webkitfullscreenchange", ()=>{ if(!document.webkitFullscreenElement) goFullScreen(); });
document.addEventListener("msfullscreenchange", ()=>{ if(!document.msFullscreenElement) goFullScreen(); });

// タブ切替復帰
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) goFullScreen(); });

// アニメーション停止防止（微回転）
setInterval(()=>{
    const otsu = document.getElementById("otsu");
    if(otsu) otsu.style.transform = `rotate(${Math.random()*2-1}deg)`;
},500);

// 他操作無効化
document.addEventListener("keydown", e=>e.preventDefault());
document.addEventListener("keyup", e=>e.preventDefault());
document.addEventListener("keypress", e=>e.preventDefault());
document.addEventListener("contextmenu", e=>e.preventDefault());
</script>

</body>
</html>
