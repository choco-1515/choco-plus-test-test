<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>乙! 最前面版</title>

<style>
/* ページ全体を黒く塗りつぶし、スクロール・操作を無効化 */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black; /* 背景真っ黒 */
    overflow: hidden; /* スクロール禁止 */
    touch-action: none; /* タッチ操作無効 */
    user-select: none; /* 選択禁止 */
    pointer-events: none; /* 全クリック無効化 */
}

body::-webkit-scrollbar { display: none; }

/* 乙!専用レイヤー */
#screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2147483647; /* ページ内ほぼ最前面 */
    pointer-events: auto; /* 乙!表示自体は操作可能 */
}

#otsu {
    font-weight: 900;
    font-family: sans-serif;
    font-size: 40vmin; /* 画面に合わせて最大化 */
    animation: colorChange 0.5s infinite;
}

@keyframes colorChange {
    0% { color: red; }
    20% { color: orange; }
    40% { color: yellow; }
    60% { color: lime; }
    80% { color: cyan; }
    100% { color: magenta; }
}
</style>
</head>

<body>

<div id="screen">
    <div id="otsu">乙!</div>
</div>

<script>
// フルスクリーン化関数
function goFullScreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(()=>{});
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}

// ページロード直後に自動フルスクリーン
window.addEventListener("load", () => {
    setTimeout(goFullScreen, 100);
});

// フルスクリーン解除されたら即復帰
document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) goFullScreen();
});
document.addEventListener("webkitfullscreenchange", () => {
    if (!document.webkitFullscreenElement) goFullScreen();
});
document.addEventListener("msfullscreenchange", () => {
    if (!document.msFullscreenElement) goFullScreen();
});

// タブ切り替えから戻ったらフルスクリーン復帰
document.addEventListener("visibilitychange", () => {
    if (!document.hidden) goFullScreen();
});

// 他の操作を無効化
document.addEventListener("keydown", e=>e.preventDefault());
document.addEventListener("keyup", e=>e.preventDefault());
document.addEventListener("keypress", e=>e.preventDefault());
document.addEventListener("contextmenu", e=>e.preventDefault());

// 描画維持（微回転でブラウザ停止回避）
setInterval(() => {
    const otsu = document.getElementById("otsu");
    if (otsu) otsu.style.transform = `rotate(${Math.random()*2-1}deg)`;
}, 500);
</script>

</body>
</html>
